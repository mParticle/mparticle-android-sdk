plugins {
    id 'com.android.application' version '8.7.3'
    id 'org.jetbrains.kotlin.android' version '2.1.20'
}

// Standalone build: the Rokt SDK requires a newer AGP than the shared
// multi-kit build, so this example resolves published mParticle artifacts
// (mavenLocal first) instead of the in-repo kit project.
def mparticleVersion = providers.gradleProperty('mparticleVersion').getOrElse('6.0.0-rc.1')

android {
    namespace 'com.mparticle.kits.rokt.example.kotlin'
    compileSdk 35

    defaultConfig {
        applicationId 'com.mparticle.kits.rokt.example.kotlin'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation "com.mparticle:android-core:${mparticleVersion}"
    implementation "com.mparticle:android-rokt-kit:${mparticleVersion}"
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'com.google.android.material:material:1.11.0'
}
