name: Release – Publish

on:
  push:
    branches:
      - main
      - workstation/*
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  setup-and-version:
    runs-on: ubuntu-latest
    outputs:
      final_version: ${{ steps.version-file.outputs.release-version }}
      is_prerelease: ${{ steps.version-file.outputs.is-prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get current version
        id: version-file
        run: |
          version_from_file=$(head -n 1 VERSION)
          echo "release-version=$version_from_file" >> $GITHUB_OUTPUT
          if [[ "$version_from_file" == *"-"* ]]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    needs: setup-and-version
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Publish core to Maven local (required before kits can compile)
        run: ./gradlew publishMavenPublicationToMavenLocal -PVERSION=${{ needs.setup-and-version.outputs.final_version }}

      - name: Publish core to Maven Central
        run: ./gradlew publishMavenPublicationToMavenCentralRepository -PVERSION=${{ needs.setup-and-version.outputs.final_version }}

      - name: Publish kits to Maven Central
        run: ./gradlew publishMavenPublicationToMavenCentralRepository -PVERSION=${{ needs.setup-and-version.outputs.final_version }} -c settings-kits.gradle

      # rokt-sdk-plus (com.rokt:rokt-sdk-plus) is an umbrella over the mParticle Rokt kit + the
      # Rokt Payment Extension. The "Publish core to Maven local" step above already placed
      # android-core/android-kit-base/android-kit-plugin in mavenLocal; we also need the Rokt
      # kit there so the umbrella resolves its mParticle dependencies locally rather than racing
      # Maven Central propagation. com.rokt:payment-extension (+ roktsdk) come from Central,
      # released independently from the ROKT sdk-android-source repo.
      - name: Publish Rokt kit to Maven local (so rokt-sdk-plus resolves it locally)
        run: ./gradlew :kits:android-rokt:rokt:publishMavenPublicationToMavenLocal -PVERSION=${{ needs.setup-and-version.outputs.final_version }} -c settings-kits.gradle

      # Published under the com.rokt namespace, so this step uses the Rokt Maven Central
      # credentials/signing key (separate from the com.mparticle secrets used above).
      - name: Publish rokt-sdk-plus to Maven Central
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ROKT_MAVEN_CENTRAL_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ROKT_MAVEN_CENTRAL_SIGNING_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ROKT_SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ROKT_SONATYPE_NEXUS_PASSWORD }}
        run: ./gradlew publishMavenPublicationToMavenCentralRepository -PVERSION=${{ needs.setup-and-version.outputs.final_version }} -c settings-rokt-sdk-plus.gradle

      - name: Create GitHub release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          makeLatest: ${{ needs.setup-and-version.outputs.is_prerelease != 'true' }}
          prerelease: ${{ needs.setup-and-version.outputs.is_prerelease == 'true' }}
          tag: ${{ needs.setup-and-version.outputs.final_version }}
          body: |
            Release ${{ needs.setup-and-version.outputs.final_version }}
