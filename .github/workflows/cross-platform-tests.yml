name: "Cross Platform Tests"
on: pull_request

permissions:
  contents: read
  pull-requests: read
jobs:
  cross-platform-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Cross Platform Tests Repo"
        uses: actions/checkout@v6
        with:
          repository: mParticle/crossplatform-sdk-tests

      - name: "Checkout Android SDK Branch"
        uses: actions/checkout@v6
        with:
          repository: ${{github.event.pull_request.head.repo.full_name}}
          ref: ${{github.head_ref}}
          path: .sdks/android

      - name: "Patch cross-platform Gradle compatibility"
        run: |
          sed -i 's/\.with(/.using(/g' settings.gradle.kts
          sed -i 's/version("7.3.1")/version("8.3.2")/g' settings.gradle.kts
          sed -i 's/com.android.tools.build:gradle:7.3.1/com.android.tools.build:gradle:8.3.2/g' settings.gradle.kts
          sed -i "s/classifier = 'javadoc'/archiveClassifier.set('javadoc')/g" .scripts/maven.gradle
          perl -0pi -e 's/android \{\n    compileSdk = 31/android {\n    namespace = "com.mparticle.mocking"\n    compileSdk = 31/' mocking/build.gradle.kts
          perl -0pi -e 's/android \{\n    compileSdk = 31/android {\n    namespace = "com.mparticle.cpt.testing"\n    compileSdk = 31/' Tests/build.gradle.kts
          sed -i 's/ package="com.mparticle.mocking"//' mocking/src/androidMain/AndroidManifest.xml
          sed -i 's/ package="com.mparticle.cpt.testing"//' Tests/helpers/AndroidManifest.xml
          echo "kotlin.jvm.target.validation.mode=warning" >> gradle.properties

      - name: Gradle cache
        uses: gradle/gradle-build-action@842c587ad8aa4c68eeba24c396e15af4c2e9f30a #v2.9.0

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-cache

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b #v2.35.0
        with:
          api-level: 29
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: "Install JDK 17"
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
      - name: "Run Crossplatform Tests"
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b #v2.35.0
        with:
          api-level: 29
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb uninstall com.mparticle.kittests || true
            adb uninstall com.mparticle.kits.test || true
            adb uninstall com.mparticle.legacyTest || true
            adb uninstall com.mparticle.test || true
            adb uninstall com.mparticle.cpt.testing.test || true
            .sdks/android/gradlew runAndroid
      - name: "Archive Test Results"
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: "test-results"
          path: Tests/build/reports/androidTests/connected/**
