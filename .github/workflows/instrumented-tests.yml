name: Instrumented Tests (Reusable)

on:
  workflow_call:
    inputs:
      display_name:
        required: true
        type: string
      gradle_command:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      artifact_path:
        required: true
        type: string
      timeout_minutes:
        required: false
        type: number
        default: 20

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  instrumented:
    name: "Instrumented Tests (${{ inputs.display_name }})"
    timeout-minutes: ${{ inputs.timeout_minutes }}
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Branch"
        uses: actions/checkout@v6.0.2
      - name: "Install JDK 17"
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      # AVD cache disabled: causes indefinite hangs on emulator shutdown (see
      # ReactiveCircus/android-emulator-runner#373, #385, #362; WordPress/gutenberg#66771)
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: "Run Instrumented Tests (${{ inputs.display_name }})"
        uses: reactivecircus/android-emulator-runner@5d6e86df22ab11632167a1a6b0c9ab0dc3469586 #v2.36.0
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 60
        with:
          api-level: 28
          target: default
          arch: x86
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb shell settings put global transition_animation_scale 0.0
            adb shell settings put global animator_duration_scale 0.0
            for pkg in com.mparticle.kittests com.mparticle.kits.test com.mparticle.legacyTest com.mparticle.test; do if adb shell pm list packages | grep -q "$pkg"; then adb uninstall "$pkg"; fi; done
            ./gradlew --no-daemon ${{ inputs.gradle_command }}
            # Workaround for ReactiveCircus/android-emulator-runner#385: crashpad_handler
            # child processes orphaned on emulator shutdown cause the action to deadlock.
            # Send SIGINT to allow graceful exit; the || true prevents failure if already gone.
            killall -INT crashpad_handler || true
      - name: "Archive ${{ inputs.display_name }} Results"
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
